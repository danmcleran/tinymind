name: Deploy GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      # Regenerate the knowledge graph from the current source and stage it into
      # the docs assets so the published graph always matches master. No commit
      # back to the repo, and no LLM/API key: the headless rebuild reads the
      # versioned .graphify_labels.json to name communities, and PYTHONHASHSEED
      # is pinned so community detection is deterministic. _rebuild_code only
      # ever emits the full node-link graph (an unreadable hairball at ~10k
      # nodes, and skipped above the viz limit), so render_graph_html.py builds
      # the readable community-aggregated view the docs describe.
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Regenerate knowledge graph
        env:
          PYTHONHASHSEED: '0'
        run: |
          pip install "graphifyy==0.8.35"
          python -c "from pathlib import Path; from graphify.watch import _rebuild_code; _rebuild_code(Path('.'), force=True)"
          python tools/render_graph_html.py
          mkdir -p docs/assets/knowledge-graph
          cp graphify-out/graph.html docs/assets/knowledge-graph/graph.html
          cp graphify-out/graph.json docs/assets/knowledge-graph/graph.json
          echo "Published graph: $(wc -c < docs/assets/knowledge-graph/graph.html) bytes html, $(wc -c < docs/assets/knowledge-graph/graph.json) bytes json"

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
