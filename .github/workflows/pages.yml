name: Deploy GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Regenerate the knowledge graph from the current source and stage it into
      # the docs assets so the published graph always matches master. No commit
      # back to the repo, and no LLM/API key: the headless rebuild reads the
      # versioned .graphify_labels.json to name communities. PYTHONHASHSEED is
      # pinned so community detection is deterministic; the viz node limit is
      # raised so the (community-aggregated) HTML renders for the full graph.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate knowledge graph
        env:
          PYTHONHASHSEED: '0'
          GRAPHIFY_VIZ_NODE_LIMIT: '50000'
        run: |
          pip install "graphifyy==0.8.35"
          python -c "from pathlib import Path; from graphify.watch import _rebuild_code; _rebuild_code(Path('.'), force=True)"
          mkdir -p docs/assets/knowledge-graph
          cp graphify-out/graph.html docs/assets/knowledge-graph/graph.html
          cp graphify-out/graph.json docs/assets/knowledge-graph/graph.json
          echo "Published graph: $(wc -c < docs/assets/knowledge-graph/graph.html) bytes html, $(wc -c < docs/assets/knowledge-graph/graph.json) bytes json"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
