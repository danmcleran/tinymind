version: 2
updates:
  # Keep GitHub Actions pinned to commit SHAs current. Dependabot opens a PR
  # (with the new SHA + a comment naming the version) when a pinned action
  # publishes a new release, so SHA-pinning does not mean stale actions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
